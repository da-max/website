image: docker:20.10.12-dind-alpine3.15
services:
    - name: docker:20.10.12-dind-alpine3.15
      alias: docker

stages:
    - build
    - deploy

default:
    before_script:
        - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG

build:
    stage: build
    script:
        - docker build -t $IMAGE_TAG -f Dockerfile.prod
        - docker push $IMAGE_TAG

deploy:dev:
    stage: deploy
    image: gitlab/dind:latest
    cache: {}
    services:
        - docker:dind
    variables:
        DOCKER_DRIVER: overlay
    before_script:
        - mkdir -p ~/.ssh
        - eval $(ssh-agent -s)
        - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
        - chmod 700 ~/.ssh
        - ssh-keyscan $DEPLOYMENT_SERVER_IP >> ~/.ssh/known_hosts
        - chmod 644 ~/.ssh/known_hosts
    script:
        - ssh $DEPLOYMENT_SERVER_USER@$DEPLOYMENT_SERVER_IP "docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}"
        - ssh $DEPLOYMENT_SERVER_USER@$DEPLOYMENT_SERVER_IP "docker pull ${IMAGE_TAG} && docker stop ${IMAGE_TAG} && docker run -p 3000:3000 ${IMAGE_TAG}" || true
        - ssh $DEPLOYMENT_SERVER_USER@$DEPLOYMENT_SERVER_IP "docker container prune -f" || true
    only:
        - dev
    environment:
        name: developpement
        url: https://dev.fedabian.fr

deploy:prod:
    stage: deploy
    image: gitlab/dind:latest
    cache: {}
    services:
        - docker:dind
    variables:
        DOCKER_DRIVER: overlay
    before_script:
        - mkdir -p ~/.ssh
        - eval $(ssh-agent -s)
        - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
        - chmod 700 ~/.ssh
        - ssh-keyscan $DEPLOYMENT_SERVER_IP >> ~/.ssh/known_hosts
        - chmod 644 ~/.ssh/known_hosts
    script:
        - ssh $DEPLOYMENT_SERVER_USER@$DEPLOYMENT_SERVER_IP "docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}"
        - ssh $DEPLOYMENT_SERVER_USER@$DEPLOYMENT_SERVER_IP "docker-compose -f fedabian/compose.yml pull && docker-compose -f fedabian/compose.yml down && docker-compose -f fedabian/compose.yml up -d" || true
        - ssh $DEPLOYMENT_SERVER_USER@$DEPLOYMENT_SERVER_IP "docker container prune -f" || true
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          when: manual
    environment:
        name: production
        url: https://fedabian.fr
